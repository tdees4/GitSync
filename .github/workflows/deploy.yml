name: Deploy to Raspberry Pi

on:
  push:
    branches:
      - main
      - dev
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Run tests
        run: ./gradlew test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: test-results
          path: build/reports/tests/

  build:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set image tag
        run: |
          if [[ "${GITHUB_REF##*/}" == "main" ]]; then
            echo "TAG=prod" >> $GITHUB_ENV
          else
            echo "TAG=dev" >> $GITHUB_ENV
          fi

      - name: Log in to Docker Hub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push multi-arch image # Raspberry Pi uses ARM64 architecture
        run: |
          docker buildx build \
            --platform linux/arm64 \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/gitsync-bot:${TAG} \
            --push .

      - name: Push image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/gitsync-bot:${TAG}

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Install Cloudflared
        run: |
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
          sudo mv cloudflared-linux-amd64 /usr/local/bin/cloudflared
          sudo chmod +x /usr/local/bin/cloudflared

      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PI_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Set deployment variables
        run: |
          echo "BRANCH=${GITHUB_REF##*/}" >> $GITHUB_ENV
  
          if [[ "${GITHUB_REF##*/}" == "main" ]]; then
            echo "COMPOSE_FILE=docker-compose.prod.yml" >> $GITHUB_ENV
            echo "PROJECT_NAME=prod" >> $GITHUB_ENV
          else
            echo "COMPOSE_FILE=docker-compose.dev.yml" >> $GITHUB_ENV
            echo "PROJECT_NAME=dev" >> $GITHUB_ENV
          fi

      - name: Deploy to Raspberry Pi
        run: |
          ssh -o StrictHostKeyChecking=no \
              -o ProxyCommand="cloudflared access ssh --hostname ${{ secrets.PI_HOST }}" \
              ${{ secrets.PI_USERNAME }}@${{ secrets.PI_HOST }} << 'EOF'
          
            cd ~/gitsync-bot
          
            echo "Pulling latest code..."
            git fetch origin
            git checkout $BRANCH
            git pull origin $BRANCH
          
            echo "Pulling latest image..."
            docker compose -P $PROJECT_NAME -f $COMPOSE_FILE pull
          
            echo "Starting containers..."
            docker compose -p $PROJECT_NAME -f $COMPOSE_FILE up -d
          
            echo "Container status:"
            docker compose -p $PROJECT_NAME -f $COMPOSE_FILE ps
          
            echo "Recent logs:"
            docker compose -p $PROJECT_NAME -f $COMPOSE_FILE logs --tail=50 gitsync-bot
          
            echo "Cleaning up..."
            docker image prune -f
          EOF