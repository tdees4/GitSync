version: '3.8'

services:
  postgres-prod:
    image: postgres:16-alpine
    container_name: gitsync-bot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: botuser
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ./postgres-prod-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U botuser -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  gitsync-bot:
    image: tdees15/gitsync-bot:prod
    container_name: gitsync-bot-prod
    restart: unless-stopped
    depends_on:
      postgres-prod:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-prod:5432/postgres
      SPRING_DATASOURCE_USERNAME: botuser
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      GITSYNC_API_KEY: ${GITSYNC_API_KEY}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      GITSYNC_ENCRYPTION_KEY: ${GITSYNC_ENCRYPTION_KEY}
    ports:
      - "8010:8080"
    volumes:
      - ./logs-prod:/app/logs
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 512m

networks:
  default:
    name: gitsync-bot-network-prod